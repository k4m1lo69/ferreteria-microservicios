spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: ms-auth
              uri: http://host.docker.internal:8080
              predicates:
                - Path=/api/auth/**

            - id: ms-producto
              uri: http://host.docker.internal:8081
              predicates:
                - Path=/api/productos/**

            - id: ms-pedidos
              uri: http://host.docker.internal:8082
              predicates:
                - Path=/api/pedidos/**

            - id: ms-clientes
              uri: http://host.docker.internal:8083
              predicates:
                - Path=/api/clientes/**

            - id: ms-pagos
              uri: http://host.docker.internal:8084
              predicates:
                - Path=/api/pagos/**

            - id: ms-reportes
              uri: http://host.docker.internal:8085
              predicates:
                - Path=/api/reportes/**

            - id: ms-inventarios
              uri: http://host.docker.internal:8086
              predicates:
                - Path=/api/inventarios/**

server:
  port: 8090