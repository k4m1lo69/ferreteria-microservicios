spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-auth
              uri: http://localhost:8080
              predicates:
                - Path=/api/auth/**
            - id: ms-producto
              uri: http://localhost:8081
              predicates:
                - Path=/api/productos/**
            - id: ms-pedidos
              uri: http://localhost:8082
              predicates:
                - Path=/api/pedidos/**
            - id: ms-clientes
              uri: http://localhost:8083
              predicates:
                - Path=/api/clientes/**
            - id: ms-pagos
              uri: http://localhost:8084
              predicates:
                - Path=/api/pagos/**
            - id: ms-reportes
              uri: http://localhost:8085
              predicates:
                - Path=/api/reportes/**
            - id: ms-inventarios
              uri: http://localhost:8086
              predicates:
                - Path=/api/inventarios/**

server:
  port: 8090